services:
  db:
    image: mariadb:10.11
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: backlog_db
    ports:
      - "13306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql

    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h localhost -u root -proot --protocol=tcp --silent || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 40s

  backend:
    build:
      context: ./Backend/BacklogApi
      dockerfile: Dockerfile
    restart: always
    environment:
      - ConnectionStrings__DefaultConnection=server=db;database=backlog_db;user=root;password=root
      - ASPNETCORE_ENVIRONMENT=Development
      - BACKUP_PATH=/backups
    volumes:
      - backups:/backups
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "12404:443"
    depends_on:
      - backend

volumes:
  mariadb_data:
  backups:
